                        </div>
                    </div>

                    <div className="w-full lg:w-2/3 xl:w-3/4 flex flex-col gap-6">
                        
                        <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 relative overflow-hidden">
                        <div className="flex flex-col xl:flex-row xl:items-start justify-between gap-6 mb-8">
                            <div>
                            <div className="inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg text-sm font-bold mb-4">
                                <i className="fas fa-map-marker-alt"></i> Route {activeRoute.id}
                            </div>
                            <h2 className="text-3xl font-black text-slate-900 mb-2 flex items-center gap-3">
                                {activeRoute.title}
                                {activeRoute.id === 5 && (
                                <span className="text-xs bg-emerald-100 text-emerald-800 px-2 py-1 rounded-md font-bold flex items-center gap-1.5">
                                    <i className="fas fa-user-plus"></i> 3인 쉐어 모드
                                </span>
                                )}
                            </h2>
                            <p className="text-slate-500 font-medium leading-relaxed max-w-xl">
                                {activeRoute.vibe}
                            </p>
                            </div>
                            
                            <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 min-w-[240px]">
                            <p className="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-3 flex items-center justify-between">
                                <span>나의 구간 경비</span>
                                <span className="bg-indigo-200 text-indigo-800 px-1.5 py-0.5 rounded text-[10px]">1인 분담액</span>
                            </p>
                            <div className="space-y-2 mb-3 text-sm font-medium text-indigo-900">
                                <div className="flex justify-between items-center">
                                <span>숙박:</span> 
                                <div className="text-right">
                                    <span className="text-xs text-indigo-400 line-through mr-1">${activeRoute.costSummary.hotel}</span>
                                    <span className="font-bold">${activeRoute.costSummary.hotelPerPax.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                </div>
                                </div>
                                <div className="flex justify-between items-center">
                                <span>식비(마트포함):</span> 
                                <div className="text-right">
                                    <span className="text-xs text-indigo-400 line-through mr-1">${activeRoute.costSummary.food}</span>
                                    <span className="font-bold">${activeRoute.costSummary.foodPerPax.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                </div>
                                </div>
                                <div className="flex justify-between items-center">
                                <span>교통:</span> 
                                <div className="text-right">
                                    <span className="text-xs text-indigo-400 line-through mr-1">${activeRoute.costSummary.transit}</span>
                                    <span className="font-bold">${activeRoute.costSummary.transitPerPax.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                </div>
                                </div>
                            </div>
                            <div className="pt-3 border-t border-indigo-200 flex justify-between items-baseline">
                                <span className="font-bold text-indigo-900">Total:</span>
                                <span className="text-2xl font-black text-indigo-700">${activeRoute.costSummary.perPaxTotal.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                            </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-slate-900 text-white rounded-2xl">
                            <div>
                            <p className="text-xs text-slate-400 font-semibold uppercase mb-1">Train</p>
                            <p className="font-bold flex items-center gap-2">
                                <i className="fas fa-train text-slate-400"></i> {activeRoute.train.name}
                            </p>
                            </div>
                            <div>
                            <p className="text-xs text-slate-400 font-semibold uppercase mb-1">Schedule</p>
                            <p className="font-bold flex items-center gap-2 text-[15px]">
                                <i className="far fa-calendar-alt text-slate-400"></i> {activeRoute.train.date}
                            </p>
                            </div>
                            <div>
                            <p className="text-xs text-slate-400 font-semibold uppercase mb-1">Sleep Strategy</p>
                            <p className="font-bold text-emerald-400 flex items-center gap-2">
                                <i className="fas fa-moon"></i> {activeRoute.train.saveNight}
                            </p>
                            </div>
                        </div>
                        </div>

                        <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="p-2.5 bg-rose-100 text-rose-600 rounded-xl"><i className="fas fa-route text-lg"></i></div>
                            <div>
                            <h3 className="text-lg font-bold text-slate-900">일정 및 추천 코스</h3>
                            <p className="text-xs font-bold text-slate-400">마트 방문 동선 완벽 정리</p>
                            </div>
                        </div>

                        <div className="space-y-6 relative before:absolute before:inset-0 before:ml-4 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-200 before:to-transparent">
                            {activeRoute.itinerary.map((day, idx) => (
                            <div key={idx} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                <div className="flex items-center justify-center w-8 h-8 rounded-full border-4 border-white bg-rose-100 text-rose-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
                                <span className="text-[10px] font-black">{idx + 1}</span>
                                </div>
                                <div className="w-[calc(100%-3rem)] md:w-[calc(50%-2rem)] p-4 rounded-2xl bg-slate-50 border border-slate-100 shadow-sm">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-xs font-bold text-rose-500 bg-rose-50 px-2 py-1 rounded">{day.date}</span>
                                </div>
                                <h4 className="font-bold text-slate-800 text-sm mb-2">{day.title}</h4>
                                <ul className="text-xs text-slate-600 space-y-1.5 mb-3">
                                    {day.spots.map((spot, i) => (
                                    <li key={i} className="flex items-start gap-1.5">
                                        <span className="text-rose-400 mt-0.5">•</span> <span className="leading-snug">{spot}</span>
                                    </li>
                                    ))}
                                </ul>
                                <div className="pt-2 border-t border-slate-200 text-[11px] font-bold text-indigo-600 flex items-start gap-1.5 leading-snug bg-indigo-50 p-2 rounded">
                                    <i className="fas fa-subway text-indigo-400 flex-shrink-0 mt-0.5"></i> <span>이동 방법: {day.transit}</span>
                                </div>
                                </div>
                            </div>
                            ))}
                        </div>
                        </div>

                        <div className="grid lg:grid-cols-2 gap-6">
                        
                        <div className="flex flex-col gap-6">
                            {/* 마트 플랜 새로 추가 */}
                            <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 h-fit">
                                <div className="flex items-center justify-between mb-6">
                                <div className="flex items-center gap-3">
                                    <div className="p-2.5 bg-teal-100 text-teal-600 rounded-xl"><i className="fas fa-shopping-basket text-lg"></i></div>
                                    <h3 className="text-lg font-bold text-slate-900">기차 생존 식량 (마트)</h3>
                                </div>
                                </div>
                                
                                <div className="p-4 rounded-xl border border-teal-100 bg-teal-50/50">
                                    <div className="flex justify-between items-start mb-2">
                                        <div>
                                            <span className="text-[10px] font-black text-teal-600 bg-teal-100 px-2 py-0.5 rounded mr-2 mb-1 inline-block"><i className="fas fa-store"></i> 보급소 추천</span>
                                            <p className="font-bold text-slate-800 text-sm leading-snug">{activeRoute.mart.name}</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-sm font-black text-slate-800 block">${activeRoute.mart.cost}</span>
                                            <span className="text-[10px] text-slate-500">1인 ${activeRoute.mart.perPax}</span>
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-600 mb-3 leading-relaxed border-l-2 border-teal-300 pl-2 ml-1">{activeRoute.mart.items}</p>
                                    
                                    <div className="pt-3 border-t border-teal-100 flex items-start gap-1.5 text-[11px] font-bold text-indigo-600 bg-white p-2 rounded shadow-sm border border-slate-100">
                                        <i className="fas fa-walking mt-0.5 text-indigo-400 w-3"></i> <span className="leading-snug">{activeRoute.mart.transit}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 h-fit">
                                <div className="flex items-center justify-between mb-6">
                                <div className="flex items-center gap-3">
                                    <div className="p-2.5 bg-blue-100 text-blue-600 rounded-xl"><i className="fas fa-bed text-lg"></i></div>
                                    <h3 className="text-lg font-bold text-slate-900">숙소 플랜</h3>
                                </div>
                                {activeRoute.costSummary.nights > 0 && (
                                    <div className="text-[11px] font-bold text-blue-700 bg-blue-50 px-2.5 py-1 rounded-lg border border-blue-100">
                                    {activeRoute.costSummary.nights}박 ({activeRoute.costSummary.stayDates})
                                    </div>
                                )}
                                </div>
                                
                                <div className="space-y-4">
                                {activeRoute.hotels.map((hotel, idx) => (
                                    <div key={idx} className={`p-4 rounded-xl border ${hotel.type === 'primary' ? 'bg-blue-50/50 border-blue-200' : 'bg-slate-50 border-slate-100'}`}>
                                    <div className="flex justify-between items-start gap-4 mb-2">
                                        <div>
                                        {hotel.type === 'primary' && <span className="text-[10px] font-black text-blue-600 bg-blue-100 px-2 py-0.5 rounded mr-2 mb-1 inline-block"><i className="fas fa-check-circle"></i> 조식무료 & 투베드</span>}
                                        <p className="font-bold text-slate-800 text-sm leading-snug">{hotel.name}</p>
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-600 mb-3 leading-relaxed">{hotel.desc}</p>
                                    
                                    <div className="pt-3 border-t border-slate-200/60 flex items-center justify-between">
                                        <span className="text-xs font-black text-slate-800">
                                        {hotel.cost}
                                        </span>
                                        {hotel.link !== '#' && (
                                        <a 
                                            href={hotel.link} 
                                            target="_blank" 
                                            rel="noreferrer" 
                                            className="text-xs font-bold text-blue-600 flex items-center gap-1 hover:text-blue-800 transition-colors"
                                        >
                                            정보 보기 <i className="fas fa-external-link-alt text-[10px]"></i>
                                        </a>
                                        )}
                                    </div>
                                    </div>
                                ))}
                                </div>
                            </div>
                        </div>

                        {/* 식사(특식) 플랜 */}
                        <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 h-fit">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="p-2.5 bg-orange-100 text-orange-600 rounded-xl"><i className="fas fa-utensils text-lg"></i></div>
                                <div>
                                    <h3 className="text-lg font-bold text-slate-900">상남자 미식 플랜</h3>
                                    <p className="text-xs font-bold text-rose-500">팁(18~20%) & 텍스 포함가</p>
                                </div>
                            </div>
                            <div className="space-y-4">
                                {activeRoute.feasts.map((feast, idx) => (
                                    <div key={idx} className={`p-4 rounded-xl border ${feast.type === 'primary' ? 'border-orange-200 bg-orange-50/50' : 'border-slate-200 bg-slate-50'}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                {feast.type === 'primary' && <span className="text-[10px] font-black text-orange-600 bg-orange-100 px-2 py-0.5 rounded mr-2 mb-1 inline-block"><i className="fas fa-crown"></i> 1순위 추천</span>}
                                                {feast.type === 'alt' && <span className="text-[10px] font-black text-slate-500 bg-slate-200 px-2 py-0.5 rounded mr-2 mb-1 inline-block">대안 식당</span>}
                                                <span className="text-[10px] font-black text-slate-600 bg-slate-200 px-2 py-0.5 rounded">{feast.day}</span>
                                            </div>
                                            <span className="text-sm font-black text-slate-800">${feast.cost} <span className="text-[10px] text-slate-400 font-normal">(1인 ${feast.perPax})</span></span>
                                        </div>
                                        <h4 className="font-bold text-slate-800 text-sm mb-1">{feast.name}</h4>
                                        <p className="text-xs text-slate-600 mb-3">{feast.dish}</p>
                                        
                                        <div className="flex flex-col gap-1.5 pt-3 border-t border-slate-200/60">
                                            <div className="text-[10px] text-orange-600 font-bold flex items-center gap-1.5">
                                                <i className="fas fa-bell w-3"></i> {feast.rsv}
                                            </div>
                                            <div className="text-[10px] text-indigo-600 font-bold flex items-start gap-1.5 bg-white px-2 py-1.5 rounded shadow-sm border border-slate-100">
                                                <i className="fas fa-walking mt-0.5 text-indigo-400 w-3"></i> <span className="leading-snug">{feast.routeInfo}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 현지 교통비 카드 */}
                        <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 h-fit lg:col-span-2">
                            <div className="flex items-center gap-3 mb-6">
                            <div className="p-2.5 bg-emerald-100 text-emerald-600 rounded-xl"><i className="fas fa-directions text-lg"></i></div>
                            <div>
                                <h3 className="text-lg font-bold text-slate-900">현지 교통비 총괄표</h3>
                                <p className="text-xs font-bold text-slate-400">이동 수단별 명확한 요금 반영</p>
                            </div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                            {activeRoute.transitDetails.map((t, idx) => (
                                <div key={idx} className="flex flex-col p-4 rounded-xl bg-slate-50 border border-slate-100">
                                <span className="text-xs font-bold text-slate-500 mb-1">{t.desc}</span>
                                <span className="text-sm font-bold text-slate-800 mb-3">{t.method}</span>
                                <div className="flex justify-between items-center text-xs mt-auto">
                                    <span className="text-slate-400">총: ${t.cost.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 1})}</span>
                                    <span className={`font-bold px-2 py-1 rounded ${t.perPax === 0 ? 'bg-slate-200 text-slate-600' : 'bg-emerald-50 text-emerald-600'}`}>
                                    1인당: ${t.perPax.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 1})}
                                    </span>
                                </div>
                                </div>
                            ))}
                            </div>
                            <div className="mt-6 pt-4 border-t border-slate-200 flex justify-end items-center gap-3">
                                <span className="text-sm font-bold text-slate-600">이 구간 내 교통비 분담액:</span>
                                <span className="text-2xl font-black text-emerald-600">${activeRoute.costSummary.transitPerPax.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 1})}</span>
                            </div>
                        </div>
                        
                        </div>
                        
                    </div>
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
